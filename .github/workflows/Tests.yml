# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'

    - name: Build
      run: go build -v ./...

    - name: Run and generate coverage report
      run: go test -p 1 -count=1 ./... -coverprofile=./coverage.out -covermode=atomic

    - name: Show uncovered files
      run: |
        go tool cover -func=coverage.out | awk -F: '{print $1}' | sort -u > covered_files.txt
        find . -name "*.go" -not -path "./vendor/*" | sort > all_files.txt
        comm -13 covered_files.txt all_files.txt

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: coverage.out

