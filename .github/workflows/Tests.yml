# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'

    - name: Build
      run: go build -v ./...

    - name: Run and generate coverage report
      run: go test -p 1 -count=1 ./... -coverprofile=./coverage.out -covermode=atomic

    - name: Filter test files from coverage
      run: |
        grep -v "_test.go" coverage.out > coverage_filtered.out
        echo "Lines in original:"
        wc -l coverage.out
        echo "Lines in filtered:"
        wc -l coverage_filtered.out

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage_filtered.out
        codecov_yml_path: ./codecov.yml

