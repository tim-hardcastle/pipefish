# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'

    - name: List packages
      run: go list ./...

    - name: Build
      run: go build -v ./...

    - name: Run and generate coverage report
      run: cd $GITHUB_WORKSPACE && go test -p 1 ./... -coverprofile=./coverage.out

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: coverage.out

