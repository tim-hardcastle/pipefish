# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Tests

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'badge.svg'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'badge.svg'

jobs:

  build:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.1'

    - name: Build
      run: go build -v ./...

    - name: Run and generate coverage report
      run: go test -p 1 -count=1 ./... -coverprofile=./coverage.out -covermode=atomic

    - name: Generate coverage badge
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | grep "^total" | awk '{print $3}' | tr -d '%')
        curl -s "https://img.shields.io/badge/Coverage-${COVERAGE}%25-green" > badge.svg
        
    - name: Commit badge
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add badge.svg
        git diff --staged --quiet || git commit -m "Update coverage badge"
        git push

